# ═══════════════════════════════════════════════════════════════════
# SoloStrike DEV — docker-compose.yml
# Pinned to v3.6.4 CI digests. Installs alongside production LoneStrike
# (distinct app id + data dir). Host stratum ports shifted +10:
#   3343->3333 · 3344->3334 · 4343->4333 (TLS) · 4344->4334 (NiceHash)
# Rentals/marketplace testing on the DEV build must dial port 4344.
# ═══════════════════════════════════════════════════════════════════
version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: danhaus93dev-solostrike_ui_1
      APP_PORT: 8080
      PROXY_AUTH_WHITELIST: /api/widget/four-stats,/api/health,/api/health/detailed,/api/state,/api/stratum-health,/metrics

  init-permissions:
    image: alpine:3.20@sha256:d9e853e87e55526f6b2917df91a2115c36dd7c696a35be12163d44e6e2a4b6bc
    user: "0:0"
    restart: on-failure
    environment:
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS}
      - BITCOIN_ZMQ_HASHBLOCK=tcp://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
    volumes:
      - ${APP_DATA_DIR}/data:/data
    command:
      - sh
      - -c
      - |
        set -e
        echo "[init-permissions] starting"

        mkdir -p /data/ckpool/config /data/ckpool/logs /data/config /data/stunnel
        chown 1000:1000 /data
        chown -R 1000:1000 /data/ckpool /data/config
        chown -R 65534:65534 /data/stunnel
        echo "[init-permissions] chowned: ckpool+config=1000, stunnel=65534"

        # Step 2: render ckpool.conf FRESH from the committed template every run.
        # Rationale: the Bitcoin RPC host/port/credentials and ZMQ endpoint are
        # Umbrel-provided exports that can change across updates or node
        # reconfiguration. The previous "generate once, preserve forever"
        # approach left ckpool pinned to stale connection details if those
        # exports ever changed. We now regenerate the connection fields each
        # init from the live env, and preserve ONLY btcaddress (install state).
        #
        # btcaddress precedence: (1) api's saved config.json payoutAddress, else
        # (2) the btcaddress already inside an existing ckpool.conf, else
        # (3) the unspendable genesis placeholder. In --btcsolo mode the real
        # payout comes from each miner's stratum username, so the placeholder is
        # never used for real payouts.
        CONF=/data/ckpool/config/ckpool.conf
        TPL=/data/ckpool/config/ckpool.conf.template

        BTC_ADDR=""
        if [ -f /data/config/config.json ]; then
          BTC_ADDR=$$(grep -oE '"payoutAddress"[[:space:]]*:[[:space:]]*"[^"]+"' /data/config/config.json 2>/dev/null | sed -E 's/.*"payoutAddress"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/' || true)
        fi
        if [ -z "$$BTC_ADDR" ] && [ -f "$$CONF" ]; then
          BTC_ADDR=$$(grep -oE '"btcaddress"[[:space:]]*:[[:space:]]*"[^"]+"' "$$CONF" 2>/dev/null | sed -E 's/.*"btcaddress"[[:space:]]*:[[:space:]]*"([^"]+)".*/\1/' || true)
        fi
        if [ -z "$$BTC_ADDR" ]; then
          BTC_ADDR="1A1zP1eP5QGefi2DMPTfTL5SLmv7DivfNa"
        fi

        if [ ! -f "$$TPL" ]; then
          echo "[init-permissions] ERROR: missing template $$TPL" >&2
          exit 1
        fi

        # Substitute placeholders with live values using awk index()/substr()
        # LITERAL splicing (NOT sed or gsub): the RPC password is Umbrel
        # auto-generated and may contain | & / \ which corrupt regex-based
        # replacers. index()/substr() treats the replacement as an opaque
        # literal. Tmp file + atomic mv so ckpool never reads a half-written conf.
        TMP=$$(mktemp)
        awk \
          -v rpc_host="$${BITCOIN_RPC_HOST}" \
          -v rpc_port="$${BITCOIN_RPC_PORT}" \
          -v rpc_user="$${BITCOIN_RPC_USER}" \
          -v rpc_pass="$${BITCOIN_RPC_PASS}" \
          -v zmq="$${BITCOIN_ZMQ_HASHBLOCK}" \
          -v addr="$${BTC_ADDR}" \
          'function repl(line, ph, val,   p) {
             p = index(line, ph);
             if (p == 0) return line;
             return substr(line, 1, p-1) val substr(line, p+length(ph));
           }
           {
             $$0 = repl($$0, "__BITCOIN_RPC_HOST__", rpc_host);
             $$0 = repl($$0, "__BITCOIN_RPC_PORT__", rpc_port);
             $$0 = repl($$0, "__BITCOIN_RPC_USER__", rpc_user);
             $$0 = repl($$0, "__BITCOIN_RPC_PASS__", rpc_pass);
             $$0 = repl($$0, "__BITCOIN_ZMQ_HASHBLOCK__", zmq);
             $$0 = repl($$0, "__BTC_ADDR__", addr);
             print;
           }' "$$TPL" > "$$TMP"
        mv "$$TMP" "$$CONF"
        chown 1000:1000 "$$CONF"
        chmod 640 "$$CONF"
        echo "[init-permissions] rendered ckpool.conf from template (btcaddress=$$BTC_ADDR)"

        echo "[init-permissions] complete"

  ckpool:
    image: ghcr.io/danhaus93-ops/solostrike-ckpool:dev-37984cff  # DEV: ckpool master @37984cff (yyjson+ipcmining). Main app unaffected.
    user: "1000:1000"
    depends_on:
      init-permissions:
        condition: service_completed_successfully
    restart: on-failure
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 1m
    command: ["--btcsolo", "--log-shares", "--config", "/etc/ckpool/ckpool.conf"]
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/ckpool/main.pid && test -S /tmp/ckpool/listener"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s
    ports:
      - "3343:3333"
      - "3344:3334"
      - "4344:4334"
    volumes:
      - ${APP_DATA_DIR}/data/ckpool/config:/etc/ckpool
      - ${APP_DATA_DIR}/data/ckpool/logs:/var/log/ckpool
    environment:
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS}
      - BITCOIN_ZMQ_HASHBLOCK=tcp://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
      - POOL_SIGNATURE=LoneStrike-dev on Umbrel/
      - START_DIFFICULTY=10000
      - MIN_DIFFICULTY=1
      - MAX_DIFFICULTY=0
      - BLOCKPOLL=50
      - UPDATE_INTERVAL=20

  stunnel:
    image: ghcr.io/danhaus93-ops/solostrike-stunnel:v3.6.4@sha256:f057f7593e530f3c3eef8fd9004cd0d8bb2210d4cf80d5ecaf4a9d7e2e571c7d
    restart: on-failure
    security_opt:
      - no-new-privileges:true
    depends_on:
      ckpool:
        condition: service_healthy
    environment:
      - CKPOOL_HOST=danhaus93dev-solostrike_ckpool_1
    ports:
      - "4343:4333"
    volumes:
      - ${APP_DATA_DIR}/data/stunnel:/certs

  api:
    image: ghcr.io/danhaus93-ops/solostrike-api:v3.6.4@sha256:3f380da8a518e9ad5b6af454a4d30cf5cfa503ca13807ee4b0320681a8396f83
    restart: on-failure
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 30s
    depends_on:
      ckpool:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--timeout=5", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ${APP_DATA_DIR}/data/ckpool/logs:/var/log/ckpool:ro
      - ${APP_DATA_DIR}/data/ckpool/config:/etc/ckpool
      - ${APP_DATA_DIR}/data/config:/app/config
    environment:
      - NODE_ENV=production
      - SS_REGISTRY_PUBKEY=5bf81c72c7e55ccf53698185691e55a47159a5cce6343fa1f558405ea623a362
      - CKPOOL_LOG_DIR=/var/log/ckpool
      - CKPOOL_CONFIG_DIR=/etc/ckpool
      - CONFIG_DIR=/app/config
      - BITCOIN_RPC_HOST=${APP_BITCOIN_NODE_IP}
      - BITCOIN_RPC_PORT=${APP_BITCOIN_RPC_PORT}
      - BITCOIN_RPC_USER=${APP_BITCOIN_RPC_USER}
      - BITCOIN_RPC_PASS=${APP_BITCOIN_RPC_PASS}
      - BITCOIN_ZMQ_HASHBLOCK=tcp://${APP_BITCOIN_NODE_IP}:${APP_BITCOIN_ZMQ_HASHBLOCK_PORT}
      - POOL_SIGNATURE=LoneStrike-dev on Umbrel/
      - START_DIFFICULTY=10000
      - MIN_DIFFICULTY=1
      - MAX_DIFFICULTY=0
      - BLOCKPOLL=50
      - UPDATE_INTERVAL=20
      - STRATUM_PORT=3333
      - STRATUM_PORT_HOBBY=3334
      - STRATUM_PORT_NICEHASH=4344
      - HIGH_DIFFICULTY=500000
      - STRATUM_PORT_TLS=4333

  ui:
    image: ghcr.io/danhaus93-ops/solostrike-ui:v3.6.4@sha256:c2d377b44c95ef83d13e0259d8f249216cee213c1c509b430cb6cd49242eb046
    restart: on-failure
    security_opt:
      - no-new-privileges:true
    container_name: danhaus93dev-solostrike_ui_1
    environment:
      - API_HOST=danhaus93dev-solostrike_api_1
    depends_on:
      - api
